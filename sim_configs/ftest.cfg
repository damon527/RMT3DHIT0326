# Stage-1 validation config for distributed MPI-FFTW HIT forcing
# Purpose:
# - single-phase, triply periodic HIT
# - Phase B bootstrap behavior
# - practical runtime for np = 1/2/4/8 checks

# ---------------- IO ----------------
ntracers                  0
frames                    200
chkpt_freq                0
# dump_code bits:
# 1 tracer, 2 contour, 4 slices, 8 checkpoint, 16 debug diagnostic, 32 macro.dat
dump_code                 6
# keep a minimal slice set for quick sanity checks (ux, uy, uz, p)
out_flag                  135
output_dim                2
output_ind                24

# -------------- Domain --------------
x_prd                     1
y_prd                     1
z_prd                     1
walls                     0 0 0 0 0 0
xyz_bounds                0 1 0 1 0 1
sys_size                  48 48 48

# -------------- Solver --------------
# keep large dt so code picks CFL/viscous-limited step size internally
dt                        10
T                         3.0
godunov                   1
implicit                  0
fmu                       0.002
fdt_pad                   0.5

# --------- Simulation type ----------
sim_type                  ftest

# -------- HIT Stage-1 (Phase B) -----
hit_enable                1
hit_use_fft               1
hit_init_seed             12345
hit_kf2_min               1
hit_kf2_max               2

# Stage-1 target: single-phase bootstrap
hit_target_source         single_phase_bootstrap
hit_bootstrap_start_time  0.2
hit_bootstrap_steps       1000000

# keep Phase C out of Stage-1 window
hit_insert_step           100000000

# controller smoothness / stability defaults
hit_beta                  0.05
hit_delta_alpha           0.005
hit_e_floor               1e-12
hit_ramp_time             0.5
hit_target_urms           1.0
hit_k0                    4.0

# disable online KHM sampling for Stage-1
khm_enable                0

