# Stage-1 adjusted cfg for NEW spectral FFTW-MPI HIT controller
#
# Adjustments vs stability-first profile:
# 1) increase controller authority (hit_delta_alpha, hit_beta)
# 2) slightly widen forced shell (kf2_max=4)
# 3) set manual target closer to observed Eband level in recent 128^3 runs
#
# Goal: reduce Eband CoV and improve budget closure while keeping run stable.

# ---------------- IO ----------------
ntracers                  0
frames                    20
chkpt_freq                0
dump_code                 6
out_flag                  135
output_dim                2
output_ind                64

# -------------- Domain --------------
x_prd                     1
y_prd                     1
z_prd                     1
walls                     0 0 0 0 0 0
xyz_bounds                0 1 0 1 0 1
sys_size                  68 68 68

# -------------- Solver --------------
dt                        10
T                         4.0
godunov                   1
implicit                  0
fmu                       0.002
fdt_pad                   0.5

# --------- Simulation type ----------
sim_type                  ftest

# ---- HIT Stage-1 (spectral FFTW-MPI) ----
hit_enable                1
hit_use_fft               1
hit_init_seed             12345

# slightly wider forcing shell than stability-first profile
hit_kf2_min               1
hit_kf2_max               4

# manual target tuned closer to recent observed Eband plateau
hit_target_source         manual
hit_e_low_target          5.0e-2

# keep Stage-1 in long Phase-B style window
hit_bootstrap_start_time  0.2
hit_bootstrap_steps       1000000
hit_insert_step           100000000

# stronger (but still conservative) controller response
hit_beta                  0.06
hit_tau_force             0.5
hit_delta_alpha           0.008
hit_delta_alpha_rate      -1
hit_e_floor               1e-12
hit_ramp_time             0.5
hit_target_urms           1.0
hit_k0                    4.0

# disable online KHM sampling for Stage-1
khm_enable                0

# HIT quality template (Bassenne-style first pass)
hit_quality_template_enable      0
hit_quality_stride               10
hit_quality_window_start_time    1.0
hit_quality_window_end_time      -1
hit_quality_write_spectra        1
hit_quality_write_structures     0
hit_quality_tail_fraction        0.5
hit_quality_tol_k                0.10
hit_quality_tol_eps              0.10

