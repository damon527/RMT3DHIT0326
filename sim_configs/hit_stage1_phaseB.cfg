# HIT Stage-1: latest sustain + initialization logic template
#
# This config is aligned with the current code paths:
# - Initialization mode selector: hit_init_mode
# - Forcing mode selector: hit_forcing_mode
# - Forcing insertion timing: hit_forcing_insertion
# - OU/random forcing power scaling and post-injection div-free projection
#
# Recommended usage:
# 1) Start with this file for fresh Stage-1 runs.
# 2) For restart runs, keep *_state fields from recover.cfg.

# ---------------- IO ----------------
suppress                  0
display                   1
ntracers                  0
frames                    200
chkpt_freq                10
# dump_code bits: 1 tracer, 2 contour, 4 slices, 8 checkpoint, 16 diagnostics, 32 macro
dump_code                 62
# out_flag: 135 = vx + vy + vz + p
out_flag                  135
output_dim                2
output_ind                64

# -------------- Domain --------------
x_prd                     1
y_prd                     1
z_prd                     1
walls                     0 0 0 0 0 0
xyz_bounds                0 1 0 1 0 1
sys_size                  68 68 68

# -------------- Solver --------------
dt                        10
T                         4.0
godunov                   1
implicit                  0
fmu                       0.002
fdt_pad                   0.5

# --------- Simulation type ----------
sim_type                  ftest

# -------------- HIT core ------------
hit_enable                1
hit_phase                 0
hit_use_fft               1

# Initialization:
# deterministic_lowmode | random_phase_spectrum | full_spectrum_random_phase
hit_init_mode             full_spectrum_random_phase
hit_init_seed             12345
hit_init_only             0

# Forced band and initialization band
hit_kf2_min               1
hit_kf2_max               5
hit_init_k2_min           1
hit_init_k2_max           36

# Forcing mode and controller:
# shell_scalar | OU_random | random_divfree
hit_forcing_mode          OU_random
# shell_energy_feedback | constant_power
hit_control_mode          constant_power
# end_step | split_half | rhs_source
hit_forcing_insertion     rhs_source

# Target source:
# single_phase_bootstrap | manual | recalibrate
hit_target_source         single_phase_bootstrap
hit_recalibrate_target    0
hit_target_urms           1.0
hit_k0                    4.0
hit_e_low_target          3.7e-2

# Forcing and control gains
hit_force_power           0.08
hit_beta                  0.02
hit_tau_force             1.0
hit_delta_alpha           0.002
hit_delta_alpha_rate      -1
hit_e_floor               1e-12
hit_ramp_time             0.3
hit_restart_freeze_time   0.1

# Stage scheduling
hit_bootstrap_start_time  0.2
hit_bootstrap_steps       1000000
hit_insert_step           100000000

# Restart-persisted states (for fresh runs keep defaults)
hit_e_low_bar_state       0.0
hit_alpha_last_state      1.0
hit_ramp_t0_state         0.0
hit_freeze_steps_state    0

# ---------------- KHM ----------------
khm_enable                0
khm_out_stride            100
khm_pairs_per_sample      4096
khm_seed                  24680

# -------- HIT quality outputs --------
hit_quality_template_enable      0
hit_quality_stride               1
hit_quality_write_spectra        1
hit_quality_write_structures     0
hit_quality_window_start_time    1.0
hit_quality_window_end_time      -1
hit_quality_tail_fraction        0.5
hit_quality_tol_k                0.10
hit_quality_tol_eps              0.10
