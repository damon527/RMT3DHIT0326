# Stage-1 candidate cfg (stability-first, source-informed)
# Rationale from controller law in fluid_3d.cc:
#   alpha_t = sqrt(hit_e_low_target / hit_e_low_bar)
#   dal     = clamp(alpha_t - 1, +/- hit_delta_alpha)
# To avoid persistent over-damping/over-driving, choose hit_e_low_target close to
# the observed hit_e_low_bar and keep hit_delta_alpha small.
#
# This candidate targets the reported 128^3 run level:
#   observed Elow_bar ~= 3.68e-2
#   choose hit_e_low_target = 3.7e-2
#   with hit_delta_alpha=0.002 -> per-step correction capped at +/-0.2%.

# ---------------- IO ----------------
ntracers                  0
frames                    200
chkpt_freq                0
dump_code                 6
out_flag                  135
output_dim                2
output_ind                64

# -------------- Domain --------------
x_prd                     1
y_prd                     1
z_prd                     1
walls                     0 0 0 0 0 0
xyz_bounds                0 1 0 1 0 1
sys_size                  68 68 68

# -------------- Solver --------------
dt                        10
T                         3.0
godunov                   1
implicit                  0
fmu                       0.002
fdt_pad                   0.5

# --------- Simulation type ----------
sim_type                  ftest

# -------- HIT Stage-1 candidate -----
hit_enable                1
hit_use_fft               1
hit_init_seed             12345

# moderate shell width (avoid aggressive forcing bandwidth)
hit_kf2_min               1
hit_kf2_max               3

# key setting: manual target near measured steady Elow_bar
hit_target_source         manual
hit_e_low_target          3.7e-2

# keep stage-1 in Phase B window
hit_bootstrap_start_time  0.2
hit_bootstrap_steps       1000000
hit_insert_step           100000000

# stability-first controller gains
hit_beta                  0.02
hit_delta_alpha           0.002
hit_e_floor               1e-12
hit_ramp_time             0.3
hit_target_urms           1.0
hit_k0                    4.0

# disable online KHM sampling for Stage-1
khm_enable                0

